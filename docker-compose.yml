services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stockhunter
      POSTGRES_USER: stockhunter
      POSTGRES_PASSWORD: stockhunter
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockhunter -d stockhunter"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      PORT: 8080
      DATABASE_URL: postgres://stockhunter:stockhunter@db:5432/stockhunter?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY:-}
      NEWS_QUERIES: ${NEWS_QUERIES:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
