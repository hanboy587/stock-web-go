services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stockhunter
      POSTGRES_USER: stockhunter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - stockhunter_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockhunter -d stockhunter"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - stockhunter

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - stockhunter

  app:
    build: .
    environment:
      PORT: 8080
      DATABASE_URL: postgres://stockhunter:${POSTGRES_PASSWORD}@db:5432/stockhunter?sslmode=disable
      REDIS_ADDR: redis:6379
      KRX_AUTH_KEY: ${KRX_AUTH_KEY:-}
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY:-}
      DAILY_CLOSE_BACKFILL_DAYS: ${DAILY_CLOSE_BACKFILL_DAYS:-10}
      NEWS_QUERIES: ${NEWS_QUERIES:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      stockhunter:
      infra:
        aliases:
          - stockhunter

volumes:
  stockhunter_postgres_data:

networks:
  stockhunter:
  infra:
    external: true
    name: infra_default
