{{define "layout"}}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · StockHunter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-3">
        <span class="grid h-9 w-9 place-items-center rounded bg-slate-950 text-sm font-black text-white">SH</span>
        <span>
          <span class="block text-base font-bold leading-5">StockHunter</span>
          <span class="block text-xs text-slate-500">Data Discovery</span>
        </span>
      </a>
      <nav class="flex items-center gap-1 rounded bg-slate-100 p-1 text-sm font-medium">
        <a class="nav-link {{if eq .Active "home"}}nav-active{{end}}" href="/">오늘</a>
        <a class="nav-link {{if eq .Active "screener"}}nav-active{{end}}" href="/screener">검색기</a>
        <a class="nav-link {{if eq .Active "rankings"}}nav-active{{end}}" href="/rankings">랭킹</a>
        <a class="nav-link {{if eq .Active "sector"}}nav-active{{end}}" href="/sector">섹터</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
