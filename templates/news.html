{{define "content"}}
<section class="mb-6 flex flex-col justify-between gap-3 border-b border-slate-200 pb-5 md:flex-row md:items-end">
  <div>
    <p class="text-sm font-semibold text-slate-500">Market Issues</p>
    <h1 class="mt-1 text-3xl font-bold tracking-normal text-slate-950">실시간 시장 이슈 피드</h1>
  </div>
  <div class="text-sm text-slate-500">10분 캐시 · 갱신 {{.Generated.Format "15:04:05"}}</div>
</section>

<section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
  {{range .News}}
    <article class="rounded border border-slate-200 bg-white p-4 shadow-sm">
      <div class="mb-3 flex items-center justify-between gap-3 text-xs text-slate-500">
        <span class="font-semibold">{{.Source}}</span>
        <span>{{timeAgo .PublishedAt}}</span>
      </div>
      <a class="block text-base font-bold leading-6 text-slate-950 hover:underline" href="{{.Link}}" target="_blank" rel="noreferrer">{{.Title}}</a>
      <p class="mt-3 rounded bg-slate-100 px-2 py-1 text-xs font-semibold text-slate-600">{{.Query}}</p>
    </article>
  {{else}}
    <div class="rounded border border-slate-200 bg-white p-8 text-center text-sm text-slate-500">
      시장 이슈를 불러오지 못했습니다.
    </div>
  {{end}}
</section>
{{end}}
